# @package _global_
# EXP-004: Multi-seed vision benchmark, spectral branch
# Canonical config to obtain mean±std over 3 seeds.
#
# Running a single seed:
#   python src/spectralnet/cli/train.py training.seed=42
#
# All three seeds via run_exp004.sh:
#   ./run_exp004.sh

name: "exp004_vision_cifar10_multiseed"
rq_unit: "vision_benchmark"
version: "1.0"

defaults:
  - /dataset: cifar10
  - /model: spectralnet_s
  - /training: standard_exp004
  - _self_

infra:
  save_dir: "./results/runs"
  num_workers: 4

metadata:
  author: "S.V.Shpital"
  project: "SpectralNet"
  experiment: "EXP-004"
  branch: "spectral"
  note: "multi-seed baseline for paper_v2 Table 1"
