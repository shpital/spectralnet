seed: 42
epochs: 50          # 10 epochs was too few for diagnostics; 50 is a reasonable first run
batch_size: 128
strict_audit: true

optimizer:
  lr: 0.003         # slightly above 0.001: RemizovShiftLayer learns slowly due to small tau
  weight_decay: 0.0001

# Cosine scheduler: smooth descent from lr to ~0 over epochs steps
# Without scheduler, losses 'froze' (loss 2.01 at epoch 10 — sign of a plateau)
scheduler:
  type: "cosine"
  T_max: 50         # matches epochs
  eta_min: 1.0e-5
